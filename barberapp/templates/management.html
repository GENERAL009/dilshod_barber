<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber CRM - Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="wrap">
    <header class="main-header">
        <div class="logo-area">
            <span class="logo-icon">➕</span>
            <h1>Yangi yozuv</h1>
        </div>
        <div class="date-display">{{ selected_date|date:"d F, Y" }}</div>
    </header>

    <nav class="nav-bar">
        <a href="{% url 'dashboard' %}" class="nav-link">🏠 Dashboard</a>
        <a href="{% url 'management' %}" class="nav-link active">➕ Yangi qo'shish</a>
    </nav>

    <div style="max-width: 600px; margin: 0 auto;">
        <div class="card">
            <h2><span>📝</span> Ma'lumotlarni kiriting</h2>
            <form method="post">
                {% csrf_token %}
                <label>Telefon raqami</label>
                <div class="phone-row">
                    <span class="prefix">🇺🇿 +998</span>
                    <input
                            name="phone"
                            type="tel"
                            inputmode="numeric"
                            pattern="[0-9]*"
                            maxlength="9"
                            placeholder="90 123 45 67"
                            required
                            value="{{ request.POST.phone|default:'' }}"
                    />
                </div>
                <label>Kelish vaqti</label>
                {{ form.scheduled_at }}
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                    <button type="submit" style="flex: 2;">Navbatga qo'shish</button>
                    <a href="{% url 'dashboard' %}" style="flex: 1; text-decoration: none;">
                        <button type="button" class="btn-secondary" style="width: 100%;">Bekor qilish</button>
                    </a>
                </div>
                {% if form.errors %}
                <div class="err" style="margin-top: 1rem; font-size: 0.875rem; color: var(--danger);">
                    {{ form.errors }}
                </div>
                {% endif %}
            </form>
        </div>
    </div>
</div>
</body>
</html>
